# Trigger deployment when new package is pushed
name: Automatic Deployments

on:
  registry_package:
    types: [published]

concurrency: deploy-targets

jobs:
  deploy:
    if: github.event.registry_package.package_version.container_metadata.tag.name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # This is required for the Tailscale action to request a JWT from GitHub

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Ping target
        run: tailscale ping ${{ vars.TARGET_HOST}}

      - name: Deploy Wiwit app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.TARGET_HOST}}
          username: ${{ vars.TARGET_USERNAME}}
          password: dummy # https://github.com/appleboy/ssh-action/issues/344#issuecomment-2906895821
          script: |
            set -e

            echo "Deploying Wiwit Production"
            cd /opt/stacks/wiwit
            docker compose pull
            docker compose up -d

            echo "Deploying Wiwit Demo"
            cd /opt/stacks/demo-wiwit
            docker compose pull
            docker compose up -d

      - name: Write summary
        run: |
          echo '### Deployment succeeded' >> $GITHUB_STEP_SUMMARY
          echo 'App deployed 🚀' >> $GITHUB_STEP_SUMMARY
          echo 'Tag `"${{ github.event.registry_package.package_version.container_metadata.tag.name }}"`' >> $GITHUB_STEP_SUMMARY
          echo 'Digest `"${{ github.event.registry_package.package_version.container_metadata.tag.digest }}"`' >> $GITHUB_STEP_SUMMARY
